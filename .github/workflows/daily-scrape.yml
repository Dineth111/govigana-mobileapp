name: Daily Price Scraper

on:
  schedule:
    # Run daily at 03:00 UTC (which corresponds to 8:30 AM Sri Lanka Time)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allows manually triggering the scraper from the GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        DCS_PDF_URL_PATTERN: ${{ secrets.DCS_PDF_URL_PATTERN }}
      run: python scraper.py
